version: "2"

run:
  timeout: 5m

# v1 -> v2 migration (golangci-lint v1.64.8 -> v2.12.2), kept at v1 parity:
# - errcheck, govet, staticcheck, unused, ineffassign are in the v2 default set
# - gosimple was merged into staticcheck (S* checks below)
# - gofmt moved to the formatters section
# - v1's built-in default exclusions became opt-in presets in v2
# - v1 ran only SA* (staticcheck) + S* (gosimple); QF*/ST* stay off
linters:
  enable:
    - gosec
    - misspell
  settings:
    gosec:
      # Post-v1.64.8 analyzers triaged individually (GitHub issue #85).
      # Fixed in code: G115 (mqtt qos bounds), G123 (session resumption
      # disabled so the CRL check runs on every handshake). Annotated with
      # targeted #nosec at the flagged sites: G117, G703, G705. Only the
      # two below stay globally excluded:
      excludes:
        # All 23 sites are fire-and-forget jobs (container actions, scans,
        # registry refreshes) that must outlive the HTTP request by design.
        - G118 # goroutine uses context.Background in request scope
        # Secure can't be a literal: plain-HTTP LAN installs are supported,
        # so it comes from deploy config at every cookie site. The CSRF
        # double-submit cookie additionally requires HttpOnly=false.
        - G124 # cookie attributes
    staticcheck:
      checks:
        - "SA*"
        - "S*"
  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      # Test fixtures only: fake tokens (G101) and test-server proxying
      # (G704). Everything else in gosec now applies to test files too.
      - path: _test\.go
        linters:
          - gosec
        text: "G101|G704"

formatters:
  enable:
    - gofmt
