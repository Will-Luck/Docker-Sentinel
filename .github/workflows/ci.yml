name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: make build

      - name: Test
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: ./...
          # Analysis cache restored across dependency bumps can poison
          # staticcheck facts (false SA5011s after the x/crypto 0.52.0 bump,
          # runs 29379331640/attempts 1+2). Cold analysis is deterministic
          # and costs ~1 min on this repo.
          skip-cache: true
