name: Bug Report
description: Report a bug or unexpected behaviour in Docker-Sentinel
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in whatever you can — every field is optional, but more detail helps us fix it faster.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
      placeholder: What went wrong?
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Start Sentinel with config...
        2. Navigate to...
        3. Click on...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened instead.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Sentinel version
      description: The version of Docker-Sentinel you are running.
      placeholder: "e.g. v2.10.0"
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      description: How are you running Docker-Sentinel?
      options:
        - Docker
        - Binary
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Details about your system.
      placeholder: |
        OS: Ubuntu 24.04
        Docker: 27.1.0
        Architecture: amd64
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output from Docker-Sentinel. This will be rendered as a code block automatically.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
